<svg width="1200" height="510" viewBox="0 0 1200 510" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">De ruido a imagen: secuencia de difusion</title>
  <desc id="desc">Infografia con tres pasos: ruido inicial, formas guiadas por el prompt e imagen final coherente.</desc>
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#D4D4D8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="gamma" exponent="1.1" amplitude="1.2"/>
        <feFuncG type="gamma" exponent="1.1" amplitude="1.2"/>
        <feFuncB type="gamma" exponent="1.1" amplitude="1.2"/>
      </feComponentTransfer>
    </filter>
    <filter id="softNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
    <g id="tvShell">
      <rect x="0" y="0" width="210" height="166" rx="16" fill="#27272A"/>
      <rect x="10" y="10" width="190" height="122" rx="12" fill="#3F3F46"/>
      <rect x="24" y="24" width="162" height="94" rx="8" fill="url(#screenBg)" stroke="#18181B" stroke-width="2"/>
      <rect x="18" y="138" width="174" height="18" rx="9" fill="#3F3F46"/>
      <circle cx="90" cy="147" r="3" fill="#71717A"/>
      <circle cx="106" cy="147" r="3" fill="#71717A"/>
      <circle cx="122" cy="147" r="3" fill="#71717A"/>
      <path d="M66 0L42 -36" stroke="#3F3F46" stroke-width="5" stroke-linecap="round"/>
      <path d="M118 0L142 -42" stroke="#3F3F46" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g id="characterFinal">
      <ellipse cx="105" cy="88" rx="58" ry="18" fill="#000000" opacity="0.1"/>
      <path d="M54 95C62 70 82 58 104 58C126 58 146 70 154 95V123H54V95Z" fill="#F4F4F5" stroke="#111827" stroke-width="3"/>
      <path d="M66 69C77 48 93 38 105 38C117 38 133 48 144 69L136 77C127 63 116 56 105 56C94 56 83 63 74 77L66 69Z" fill="#D4D4D8" stroke="#111827" stroke-width="3"/>
      <path d="M77 63C84 49 94 42 105 42C116 42 126 49 133 63" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <circle cx="87" cy="79" r="12" fill="white" stroke="#111827" stroke-width="3"/>
      <circle cx="123" cy="79" r="12" fill="white" stroke="#111827" stroke-width="3"/>
      <circle cx="89" cy="80" r="4.5" fill="#111827"/>
      <circle cx="125" cy="80" r="4.5" fill="#111827"/>
      <path d="M98 94C102 98 108 98 112 94" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <path d="M70 104C84 111 95 115 105 115C116 115 129 111 141 104" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <path d="M66 123V137" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <path d="M144 123V137" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <path d="M54 100C44 94 38 97 36 106" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <path d="M154 100C163 92 171 96 174 108" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
      <path d="M168 101C175 93 184 95 188 108" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g id="characterGhost">
      <use href="#characterFinal" opacity="0.28"/>
      <rect x="24" y="24" width="162" height="94" rx="8" filter="url(#softNoise)"/>
    </g>
  </defs>

  <rect width="1200" height="510" rx="24" fill="#FFFFFF"/>

  <!-- Prompt bar -->
  <rect x="34" y="26" width="1132" height="74" rx="18" fill="#0F172A"/>
  <text x="60" y="55" fill="#7DD3FC" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.8">EJEMPLO DE PROMPT</text>
  <text x="60" y="81" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">"Un personaje caricaturesco saludando desde una television retro, en blanco y negro"</text>

  <!-- Panel cards (height 292→340) -->
  <g filter="url(#shadow)">
    <rect x="36" y="130" width="328" height="340" rx="24" fill="url(#panelBg)" stroke="#BFDBFE" stroke-width="2"/>
    <rect x="436" y="130" width="328" height="340" rx="24" fill="url(#panelBg)" stroke="#BFDBFE" stroke-width="2"/>
    <rect x="836" y="130" width="328" height="340" rx="24" fill="url(#panelBg)" stroke="#BFDBFE" stroke-width="2"/>
  </g>

  <!-- Card 01: Ruido inicial (badge now blue like 02) -->
  <g>
    <rect x="58" y="152" width="44" height="24" rx="12" fill="#DBEAFE"/>
    <text x="80" y="168" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">01</text>
    <text x="58" y="202" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">Ruido inicial</text>
    <text fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="17">
      <tspan x="58" y="232">Todavia no hay</tspan>
      <tspan x="58" dy="26">una figura clara.</tspan>
    </text>
    <g transform="translate(95 294)">
      <use href="#tvShell"/>
      <rect x="24" y="24" width="162" height="94" rx="8" filter="url(#noise)" opacity="0.95"/>
    </g>
  </g>

  <!-- Card 02: El prompt guia (unchanged, reference blue) -->
  <g>
    <rect x="458" y="152" width="44" height="24" rx="12" fill="#DBEAFE"/>
    <text x="480" y="168" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">02</text>
    <text x="458" y="202" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">El prompt guia</text>
    <text fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="17">
      <tspan x="458" y="232">Empiezan a aparecer</tspan>
      <tspan x="458" dy="26">rasgos y formas.</tspan>
    </text>
    <g transform="translate(495 294)">
      <use href="#tvShell"/>
      <rect x="24" y="24" width="162" height="94" rx="8" filter="url(#noise)" opacity="0.42"/>
      <use href="#characterGhost"/>
    </g>
  </g>

  <!-- Card 03: Imagen final (badge now blue like 02) -->
  <g>
    <rect x="858" y="152" width="44" height="24" rx="12" fill="#DBEAFE"/>
    <text x="880" y="168" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">03</text>
    <text x="858" y="202" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">Imagen final</text>
    <text fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="17">
      <tspan x="858" y="232">La imagen ya es</tspan>
      <tspan x="858" dy="26">coherente con el prompt.</tspan>
    </text>
    <g transform="translate(895 294)">
      <use href="#tvShell"/>
      <use href="#characterFinal"/>
    </g>
  </g>

  <!-- Arrows (repositioned to visual center of TV area) -->
  <g opacity="0.8">
    <path d="M386 377H414" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
    <path d="M404 367L416 377L404 387" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M786 377H814" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
    <path d="M804 367L816 377L804 387" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
