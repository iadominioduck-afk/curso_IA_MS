<svg viewBox="0 0 48 46" width="48" height="46" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="Intro a la IA">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="48" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2780e3"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Antena -->
  <line x1="24" y1="7" x2="24" y2="12"
        stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="4" r="3" fill="url(#g)"/>

  <!-- Orejas laterales -->
  <rect x="2"  y="21" width="4" height="10" rx="1.5" fill="url(#g)" opacity="0.45"/>
  <rect x="42" y="21" width="4" height="10" rx="1.5" fill="url(#g)" opacity="0.45"/>

  <!-- Cabeza -->
  <rect x="6" y="12" width="36" height="28" rx="5"
        fill="url(#g)" fill-opacity="0.07"
        stroke="url(#g)" stroke-width="2"/>

  <!-- Conexiones de la red neuronal -->
  <g stroke="url(#g)" stroke-width="1.2" stroke-linecap="round" opacity="0.38">
    <line x1="16" y1="23" x2="32" y2="23"/>   <!-- ojo a ojo      -->
    <line x1="16" y1="23" x2="13" y2="35"/>   <!-- ojo-izq abajo-izq -->
    <line x1="16" y1="23" x2="24" y2="36"/>   <!-- ojo-izq centro  -->
    <line x1="32" y1="23" x2="24" y2="36"/>   <!-- ojo-der centro  -->
    <line x1="32" y1="23" x2="35" y2="35"/>   <!-- ojo-der abajo-der -->
    <line x1="13" y1="35" x2="24" y2="36"/>   <!-- capa inferior   -->
    <line x1="24" y1="36" x2="35" y2="35"/>
  </g>

  <!-- Nodos ojo (brillantes = capa de entrada) -->
  <circle cx="16" cy="23" r="3.8" fill="url(#g)"/>
  <circle cx="32" cy="23" r="3.8" fill="url(#g)"/>

  <!-- Nodos inferiores (capa oculta / salida) -->
  <circle cx="13" cy="35" r="2.2" fill="url(#g)" opacity="0.60"/>
  <circle cx="24" cy="36" r="2.8" fill="url(#g)" opacity="0.72"/>
  <circle cx="35" cy="35" r="2.2" fill="url(#g)" opacity="0.60"/>
</svg>
